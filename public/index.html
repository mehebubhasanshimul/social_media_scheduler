<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeHeBuB HaSaN ShimUl - Social Media Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <header class="mb-10 border-b border-slate-800 pb-5 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 tracking-wider">
                    MeHeBuB HaSaN ShimUl
                </h1>
                <p class="text-xs text-slate-400 mt-1 tracking-widest uppercase">We Protect & Automate</p>
            </div>
            <div class="flex items-center space-x-2 bg-slate-900 border border-slate-800 px-4 py-2 rounded-full">
                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-mono text-emerald-400">Database Connected</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Form Section (5 Cols) -->
            <div class="lg:col-span-5 bg-slate-900/50 border border-slate-800 p-6 rounded-2xl backdrop-blur-sm">
                <h2 class="text-xl font-bold mb-6 flex items-center text-cyan-400">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Schedule New Post
                </h2>
                
                <form id="postForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Target Platform</label>
                        <select id="platform" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors">
                            <option value="facebook">⚡ Facebook Page</option>
                            <option value="linkedin">💼 LinkedIn Profile</option>
                            <option value="twitter">🐦 Twitter / X</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Content / Message</label>
                        <textarea id="content" rows="5" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors placeholder-slate-600" placeholder="What would you like to share?"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Release Date & Time</label>
                        <input type="datetime-local" id="time" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-600 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/20 transform hover:-translate-y-0.5 transition-all duration-200">
                        Queue Deployment
                    </button>
                </form>
            </div>

            <!-- Right: Analytics Section (7 Cols) -->
            <div class="lg:col-span-7 bg-slate-900/50 border border-slate-800 p-6 rounded-2xl backdrop-blur-sm flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold mb-6 flex items-center text-purple-400">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2"></path></svg>
                        Performance Metrics
                    </h2>
                    <div class="bg-slate-950/80 p-4 rounded-xl border border-slate-800/80">
                        <canvas id="analyticsChart" class="w-full h-64"></canvas>
                    </div>
                </div>

                <!-- Live Feed Ticker Mock -->
                <div class="mt-6 border-t border-slate-800/60 pt-4">
                    <span class="text-xs font-mono text-slate-500 uppercase tracking-wider block mb-2">System Activity Log</span>
                    <div class="bg-slate-950 font-mono text-xs p-3 rounded-lg border border-slate-900 text-cyan-500/80 h-16 overflow-y-auto" id="logTicker">
                        [SYSTEM] Ready for task scheduling...<br>
                        [CRON] Worker listener attached to /api/cron-worker (Interval: 1m)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logTicker = document.getElementById('logTicker');
        function addLog(text) {
            logTicker.innerHTML += `<br>[SYS] ${text}`;
            logTicker.scrollTop = logTicker.scrollHeight;
        }

        // Handle form posting
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const platform = document.getElementById('platform').value;
            const content = document.getElementById('content').value;
            const schedule_time = document.getElementById('time').value;

            try {
                addLog(`Attempting to schedule post for ${platform}...`);
                const response = await fetch('/api/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform, content, schedule_time })
                });
                const data = await response.json();
                if(data.status === 'success') {
                    addLog(`Success! Saved with ID: ${data.post_id}`);
                    alert(data.message);
                    document.getElementById('content').value = '';
                }
            } catch (err) {
                addLog(`Error scheduling post: ${err.message}`);
            }
        });

        // Load analytics graph
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/analytics');
                const data = await response.json();

                const ctx = document.getElementById('analyticsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [
                            { label: 'Facebook Clicks', data: data.facebook_clicks, borderColor: '#06b6d4', tension: 0.3, borderWidth: 2.5 },
                            { label: 'LinkedIn Clicks', data: data.linkedin_clicks, borderColor: '#a855f7', tension: 0.3, borderWidth: 2.5 },
                            { label: 'Twitter Clicks', data: data.twitter_clicks, borderColor: '#3b82f6', tension: 0.3, borderWidth: 2.5 }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'monospace' } } } },
                        scales: {
                            x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                            y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }
                        }
                    }
                });
            } catch (err) {
                console.error("Failed to fetch analytics:", err);
            }
        }
        
        loadAnalytics();
    </script>
</body>
</html>
